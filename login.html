<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStream - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific layouts styling just for the login block layout structure */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #141414;
        }
        .login-card {
            background-color: #1f1f1f;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #333333;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }
        .login-card h2 {
            margin-top: 0;
            margin-bottom: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 8px;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            background-color: #141414;
            border: 1px solid #333333;
            color: #ffffff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-control:focus {
            border-color: #e50914;
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="logo" style="text-align: center; margin-bottom: 25px;">CineStream</div>
        <h2>Sign In</h2>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" required placeholder="Enter your password">
            </div>
            <button type="submit" class="submit-btn login-btn">Login</button>
        </form>
    </div>
</div>

<script>
    function handleLogin(event) {
        // Stop the browser from instantly changing pages automatically
        event.preventDefault();

        var usernameInput = document.getElementById("username").value;
        var passwordInput = document.getElementById("password").value;

        // Package the values exactly like your User.java entity variables
        var loginData = {
            username: usernameInput,
            password: passwordInput
        };

        console.log("Sending authentication payload to database check for:", usernameInput);

        // Fetch verification from your Spring Boot AuthController endpoint
        fetch("http://localhost:8080/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(loginData)
        })
            .then(response => {
                if (response.ok) {
                    // Redirect ONLY if the user exists and credentials match inside MySQL
                    alert("Login successful! Redirecting...");
                    window.location.href = "catalog.html"; // Adjust to "catalog.html" if that is your main page file name
                } else {
                    // Capture the specific 401 message returned from Spring Boot
                    return response.text().then(errorMessage => {
                        alert("Login Failed: " + errorMessage);
                    });
                }
            })
            .catch(error => {
                console.error("Connection error encountered:", error);
                alert("Could not reach backend server. Make sure Spring Boot is actively running inside IntelliJ!");
            });
    }
</script>
</body>
</html>
